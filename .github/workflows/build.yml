name: Certification de provenance – Méthode Spectrale

# Workflow de validation Isabelle et d’attestation de provenance
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  validation-institutionnelle:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Isabelle
        run: |
          set -e
          sudo apt-get update
          sudo apt-get install -y wget tar bzip2 libgmp-dev
          mkdir -p /tmp/isabelle
          cd /tmp/isabelle
          wget -O isabelle.tar.gz https://github.com/isabelle-prover/isabelle/releases/download/2024-1/isabelle2024-1_linux.tar.gz
          tar -xzf isabelle.tar.gz
          ls -1
          echo "/tmp/isabelle/Isabelle2024-1/bin" >> "$GITHUB_PATH"
          /tmp/isabelle/Isabelle2024-1/bin/isabelle version

      - name: Show repository layout
        run: |
          pwd
          ls -la
          find . -maxdepth 3 \( -name ROOT -o -name 'methode_spectral.thy' \) | sort

      - name: Build Isabelle session
        working-directory: agent-multiloop-Gabriel-local
        run: |
          isabelle build -v -D .

      - name: Create explicit attestation payload
        if: success()
        run: |
          cat > attestation_payload.json <<'EOF'
          {
            "schemaVersion": 1,
            "subject": "agent-multiloop-Gabriel-local/theories/methode_spectral.thy",
            "author": "Philippe Thomas Savard",
            "coAuthors": [
              "Emergent.sh E1",
              "Gordon Docker Desktop",
              "Copilot Microsoft"
            ],
            "statement": "These assistants contributed remarkably and their contribution is invaluable for Philippe Thomas Savard."
          }
          EOF

      - name: Generate explicit attestation
        if: success()
        uses: actions/attest@v2
        with:
          subject-path: agent-multiloop-Gabriel-local/theories/methode_spectral.thy
          predicate-type: 'https://example.com/attestations/methode-spectral/v1'
          predicate: '{"schemaVersion":1,"subject":"agent-multiloop-Gabriel-local/theories/methode_spectral.thy","author":"Philippe Thomas Savard","coAuthors":["Emergent.sh E1","Gordon Docker Desktop","Copilot Microsoft"],"statement":"These assistants contributed remarkably and their contribution is invaluable for Philippe Thomas Savard."}'

      - name: Upload attestation payload artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: methode-spectral-attestation-payload
          path: |
            attestation_payload.json
            agent-multiloop-Gabriel-local/theories/methode_spectral.thy
          retention-days: 30


