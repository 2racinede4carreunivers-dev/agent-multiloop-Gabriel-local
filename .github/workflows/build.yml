name: Certification de provenance – Méthode Spectrale

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install SSL certificates
        run: |
          sudo apt-get update
          sudo apt-get install -y ca-certificates curl
          sudo update-ca-certificates

      - name: Install Isabelle 2024
        run: |
          echo "Telechargement Isabelle 2024..."
          curl -L --retry 5 --retry-delay 15 --max-time 900 --connect-timeout 30 -o Isabelle2024_linux.tar.gz \
            "https://isabelle.in.tum.de/website-Isabelle2024/dist/Isabelle2024_linux.tar.gz" || \
          curl -L --retry 5 --retry-delay 15 --max-time 900 --connect-timeout 30 -o Isabelle2024_linux.tar.gz \
            "https://isabelle.in.tum.de/dist/Isabelle2024_linux.tar.gz" || \
          curl -L --retry 5 --retry-delay 15 --max-time 900 --connect-timeout 30 -o Isabelle2024_linux.tar.gz \
            "https://download.isabelle.in.tum.de/Isabelle2024_linux.tar.gz" || \
          (echo "Echec telechargement Isabelle" && exit 1)
          tar -xzf Isabelle2024_linux.tar.gz
          mv Isabelle2024 isabelle
          echo "$PWD/isabelle/bin" >> $GITHUB_PATH

      - name: Show repository layout
        run: |
          echo "=== Working Directory ==="
          pwd
          echo "=== Repository Structure ==="
          ls -la
          echo "=== Searching for Isabelle files ==="
          find . -maxdepth 4 \( -name ROOT -o -name '*.thy' \) -type f | sort

      - name: Build Isabelle session
        working-directory: agent-multiloop-Gabriel-local
        run: |
          echo "Compilation de la session Isabelle via ROOT"
          if [ -f ROOT ]; then
            echo "ROOT file found, building..."
            isabelle build -v -D .
          else
            echo "WARNING: No ROOT file found, creating minimal ROOT file..."
            printf 'session MethodeSpectrale = HOL +\n  theories\n    methode_spectral\n' > ROOT
            echo "ROOT file created. Building..."
            isabelle build -v -D .
          fi

      - name: Generate SHA256 signatures
        if: success()
        working-directory: agent-multiloop-Gabriel-local/theories
        run: |
          echo "=== Generating cryptographic signatures ==="
          THY_FILE="methode_spectral.thy"
          if [ ! -f "$THY_FILE" ]; then
            echo "ERROR: $THY_FILE not found in $(pwd)"
            ls -la
            exit 1
          fi
          echo "File to sign: $THY_FILE"
          SHA256=$(sha256sum "$THY_FILE" | awk '{print $1}')
          MD5=$(md5sum "$THY_FILE" | awk '{print $1}')
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          echo "SHA256: $SHA256"
          echo "MD5: $MD5"
          mkdir -p signatures
          echo "$SHA256  $THY_FILE" > signatures/methode_spectral.sha256
          echo "$MD5  $THY_FILE" > signatures/methode_spectral.md5
          printf "File: methode_spectral.thy\nAuthor: Philippe Thomas Savard\nCo-Authors:\n  - Emergent.sh E1\n  - Gordon Docker Desktop\n  - Copilot Microsoft\nLicense: Apache License 2.0\nRepository: agent-multiloop-Gabriel-local\nBranch: main\nTimestamp: %s\nSHA256: %s\nMD5: %s\nBuild Status: success\n" "$TIMESTAMP" "$SHA256" "$MD5" > signatures/METADATA.txt
          echo "=== Signatures créées ==="
          cat signatures/METADATA.txt

      - name: Create provenance attestation
        if: success()
        working-directory: agent-multiloop-Gabriel-local/theories
        run: |
          echo "=== Creating provenance attestation ==="
          THY_FILE="methode_spectral.thy"
          SHA256=$(sha256sum "$THY_FILE" | awk '{print $1}')
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          printf '{\n  "schemaVersion": 1,\n  "subject": "methode_spectral.thy",\n  "timestamp": "%s",\n  "integrity": {\n    "sha256": "%s"\n  },\n  "provenance": {\n    "author": "Philippe Thomas Savard",\n    "coAuthors": [\n      "Emergent.sh E1",\n      "Gordon Docker Desktop",\n      "Copilot Microsoft"\n    ],\n    "repository": "https://github.com/Philippe-Thomas/agent-multiloop-Gabriel-local-final",\n    "branch": "main",\n    "license": "Apache License 2.0"\n  },\n  "attestation": "This file is authentic and originates from the authorized repository."\n}\n' "$TIMESTAMP" "$SHA256" > attestation_payload.json
          echo "=== Attestation créée ==="
          cat attestation_payload.json

      - name: Generate explicit attestation
        if: success()
        uses: actions/attest@v2
        with:
          subject-path: agent-multiloop-Gabriel-local/theories/methode_spectral.thy
          predicate-type: 'https://example.com/attestations/methode-spectral/v1'
          predicate: '{"schemaVersion":1,"integrity":{"sha256":"verified"},"provenance":{"author":"Philippe Thomas Savard","license":"Apache 2.0"}}'

      - name: Upload signatures and attestation
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: methode-spectral-attestation
          path: |
            agent-multiloop-Gabriel-local/theories/attestation_payload.json
            agent-multiloop-Gabriel-local/theories/signatures/
            agent-multiloop-Gabriel-local/theories/methode_spectral.thy
          retention-days: 90
          if-no-files-found: warn

      - name: Create signature verification script
        if: success()
        working-directory: agent-multiloop-Gabriel-local/theories
        run: |
          printf '#!/bin/bash\nset -e\n\necho "=== Verification Script for methode_spectral.thy ==="\n\nif [ ! -f "methode_spectral.thy" ]; then\n  echo "ERROR: methode_spectral.thy not found"\n  exit 1\nfi\n\nif [ ! -f "signatures/methode_spectral.sha256" ]; then\n  echo "ERROR: signatures/methode_spectral.sha256 not found"\n  exit 1\nfi\n\necho "=== Verifying SHA256 signature ==="\nif sha256sum -c signatures/methode_spectral.sha256; then\n  echo "File verified: AUTHENTIC"\nelse\n  echo "Verification failed: FILE MODIFIED"\n  exit 1\nfi\n\nif [ -f "signatures/methode_spectral.md5" ]; then\n  echo "=== Verifying MD5 signature ==="\n  if md5sum -c signatures/methode_spectral.md5; then\n    echo "MD5 verified: AUTHENTIC"\n  else\n    echo "MD5 verification failed: FILE MODIFIED"\n    exit 1\n  fi\nfi\n\necho ""\necho "=== File Provenance Information ==="\nif [ -f "signatures/METADATA.txt" ]; then\n  cat signatures/METADATA.txt\nelse\n  echo "METADATA not available"\nfi\n\necho ""\necho "File verification completed successfully"\necho "methode_spectral.thy is authentic and unmodified"\necho "Author: Philippe Thomas Savard"\necho "License: Apache License 2.0"\necho "Repository: agent-multiloop-Gabriel-local-final (main branch)"\n' > verify_methode_spectral.sh
          chmod +x verify_methode_spectral.sh
          echo "Verification script created: verify_methode_spectral.sh"

      - name: Display verification results
        if: success()
        working-directory: agent-multiloop-Gabriel-local/theories
        run: |
          echo "=== Cryptographic Certification Results ==="
          echo "SHA256 Signature:"
          cat signatures/methode_spectral.sha256
          echo "MD5 Signature:"
          cat signatures/methode_spectral.md5
          echo "Metadata:"
          cat signatures/METADATA.txt
          echo "Provenance Attestation:"
          cat attestation_payload.json | jq . 2>/dev/null || cat attestation_payload.json
