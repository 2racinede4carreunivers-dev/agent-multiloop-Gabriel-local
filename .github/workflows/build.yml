name: Build Isabelle Minimal + Attestation Spécifique

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build_and_verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install SSL certificates
        run: |
          sudo apt-get update
          sudo apt-get install -y ca-certificates curl
          sudo update-ca-certificates

      # ================================================================
      # Cache Isabelle heap (HOL-Computational_Algebra + dependances).
      # Cle basee sur le contenu du fichier ROOT + .thy pour invalider
      # automatiquement le cache si la theorie change.
      # ================================================================
      - name: Cache Isabelle heap (HOL-Computational_Algebra + Methode_Spectral)
        uses: actions/cache@v4
        id: cache-isabelle-heap
        with:
          path: |
            ~/.isabelle/Isabelle2024/heaps
            isabelle
          key: isabelle2024-minimal-${{ hashFiles('agent-multiloop-Gabriel-local/theories/ROOT', 'agent-multiloop-Gabriel-local/theories/methode_spectral.thy') }}
          restore-keys: |
            isabelle2024-minimal-

      - name: Install Isabelle 2024 (installation minimale)
        if: steps.cache-isabelle-heap.outputs.cache-hit != 'true'
        run: |
          echo "Téléchargement Isabelle 2024..."
          curl -L --retry 5 --retry-delay 10 --max-time 600 -o Isabelle2024_linux.tar.gz \
            "https://isabelle.in.tum.de/website-Isabelle2024/dist/Isabelle2024_linux.tar.gz" || \
          curl -L --retry 5 --retry-delay 10 --max-time 600 -o Isabelle2024_linux.tar.gz \
            "https://isabelle.in.tum.de/dist/Isabelle2024_linux.tar.gz" || \
          (echo "Échec du téléchargement" && exit 1)

          tar -xzf Isabelle2024_linux.tar.gz
          mv Isabelle2024 isabelle
          rm -f Isabelle2024_linux.tar.gz
          echo "Taille initiale de l'installation :"
          du -sh isabelle/

          # ========================================================
          # SUPPRESSION DES COMPOSANTS NON UTILISES POUR NOTRE BUILD
          # (installation minimale, gain ~450-500 MB sur ~1.4 GB)
          # ========================================================
          echo "Suppression des composants non essentiels..."

          # Documentation PDF (~200 MB)
          rm -rf isabelle/doc/ 2>/dev/null || true

          # SMT solvers externes (Z3, CVC*) - non requis par Methode_Spectral
          rm -rf isabelle/contrib/z3-*/ 2>/dev/null || true
          rm -rf isabelle/contrib/cvc*-*/ 2>/dev/null || true
          rm -rf isabelle/contrib/e-*/ 2>/dev/null || true
          rm -rf isabelle/contrib/spass-*/ 2>/dev/null || true
          rm -rf isabelle/contrib/vampire-*/ 2>/dev/null || true

          # jEdit GUI et orthographe - GitHub Actions est headless
          rm -rf isabelle/contrib/jedit_build-*/ 2>/dev/null || true
          rm -rf isabelle/contrib/jortho-*/ 2>/dev/null || true
          rm -rf isabelle/src/Tools/jEdit/ 2>/dev/null || true

          # Exemples, tutoriels, source docs (non necessaires au build)
          rm -rf isabelle/src/Doc/ 2>/dev/null || true
          rm -rf isabelle/src/HOL/Examples/ 2>/dev/null || true
          rm -rf isabelle/src/HOL/Isar_Examples/ 2>/dev/null || true

          # Composants IsaFoR/ATP secondaires
          rm -rf isabelle/contrib/isabelle_fonts-*/ 2>/dev/null || true

          echo "Taille apres nettoyage minimal :"
          du -sh isabelle/

          echo "$PWD/isabelle/bin" >> $GITHUB_PATH

      - name: Restore Isabelle PATH (cache hit)
        if: steps.cache-isabelle-heap.outputs.cache-hit == 'true'
        run: |
          echo "Cache heap Isabelle restaure, aucune reinstallation necessaire."
          echo "$PWD/isabelle/bin" >> $GITHUB_PATH
          du -sh isabelle/ 2>/dev/null || echo "(taille non disponible)"

      - name: Vérification et Compilation de methode_spectral.thy
        run: |
         echo "Compilation via session Isabelle 'Methode_Spectral' (fichier ROOT)..."
         cd agent-multiloop-Gabriel-local/theories
         isabelle build -v -D .

      - name: Generate attestation report (SHA-256 de la théorie)
        run: |
          mkdir -p output_report
          THY_PATH="agent-multiloop-Gabriel-local/theories/methode_spectral.thy"
          if [ -f "$THY_PATH" ]; then
            sha256sum "$THY_PATH" > output_report/attestation_report.txt
            echo "" >> output_report/attestation_report.txt
            echo "# Attestation de compilation Isabelle" >> output_report/attestation_report.txt
            echo "# Commit  : ${{ github.sha }}" >> output_report/attestation_report.txt
            echo "# Run     : ${{ github.run_id }}" >> output_report/attestation_report.txt
            echo "# Date UTC: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> output_report/attestation_report.txt
            echo "# Author  : Philippe Thomas Savard" >> output_report/attestation_report.txt
            echo "# License : Apache-2.0" >> output_report/attestation_report.txt
            cat output_report/attestation_report.txt
          else
            echo "Fichier methode_spectral.thy introuvable a $THY_PATH." > output_report/attestation_report.txt
            exit 1
          fi

      - name: Generate build metadata
        run: |
          echo "Build provenance minimale" > output_report/build_metadata.txt
          echo "Commit SHA : $(git rev-parse HEAD)" >> output_report/build_metadata.txt
          echo "Branche : $(git rev-parse --abbrev-ref HEAD)" >> output_report/build_metadata.txt
          echo "Date : $(date -u)" >> output_report/build_metadata.txt
          echo "" >> output_report/build_metadata.txt
          echo "SHA-256 du fichier vérifié :" >> output_report/build_metadata.txt
          cat output_report/attestation_report.txt >> output_report/build_metadata.txt

      - name: Upload HOL Theory Artifact (methode_spectral.thy)
        uses: actions/upload-artifact@v4
        with:
          name: methode-spectral-theory
          path: agent-multiloop-Gabriel-local/theories/methode_spectral.thy

      - name: Upload attestation report
        uses: actions/upload-artifact@v4
        with:
          name: attestation-report-spectral
          path: output_report/attestation_report.txt

      - name: Upload build metadata
        uses: actions/upload-artifact@v4
        with:
          name: build-metadata-spectral
          path: output_report/build_metadata.txt

      - name: Generate build provenance (SLSA v1 - Certification officielle)
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: |
            agent-multiloop-Gabriel-local/theories/methode_spectral.thy
            output_report/attestation_report.txt