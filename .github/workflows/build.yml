name: Certification de provenance – Méthode Spectrale

# Workflow de validation Isabelle et d'attestation de provenance
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  validation-institutionnelle:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Isabelle (lightweight version)
        run: |
          set -e
          sudo apt-get update
          sudo apt-get install -y wget tar gzip libgmp-dev curl
          mkdir -p /tmp/isabelle
          cd /tmp/isabelle
          
          echo "=== Downloading Isabelle 2024-1 (lightweight) ==="
          # URL officielle TUM (plus fiable que GitHub releases)
          ISABELLE_URL="https://isabelle.in.tum.de/dist/Isabelle2024-1_linux.tar.gz"
          
          # Télécharger avec curl (plus robuste)
          curl -L --show-error --progress-bar -o isabelle.tar.gz "$ISABELLE_URL"
          
          echo "=== Verifying archive integrity ==="
          # Vérifier que c'est un gzip valide
          if ! file isabelle.tar.gz | grep -q 'gzip compressed'; then
            echo "ERROR: Archive is not a valid gzip file"
            file isabelle.tar.gz
            exit 1
          fi
          
          echo "=== Extracting Isabelle ==="
          tar -xzf isabelle.tar.gz
          
          # Trouver le répertoire Isabelle
          ISABELLE_DIR=$(ls -d Isabelle* 2>/dev/null | head -1)
          if [ -z "$ISABELLE_DIR" ]; then
            echo "ERROR: Could not find Isabelle directory"
            ls -la
            exit 1
          fi
          
          echo "Found Isabelle in: $ISABELLE_DIR"
          echo "/tmp/isabelle/$ISABELLE_DIR/bin" >> "$GITHUB_PATH"
          
          echo "=== Isabelle version ==="
          /tmp/isabelle/$ISABELLE_DIR/bin/isabelle version

      - name: Show repository layout
        run: |
          echo "=== Working Directory ==="
          pwd
          echo "=== Repository Structure ==="
          ls -la
          echo "=== Searching for Isabelle files ==="
          find . -maxdepth 4 \( -name ROOT -o -name '*.thy' \) -type f | sort

      - name: Build Isabelle session
        working-directory: agent-multiloop-Gabriel-local
        run: |
          echo "=== Building Isabelle session ==="
          if [ -f ROOT ]; then
            isabelle build -v -D .
          else
            echo "WARNING: No ROOT file found, listing contents:"
            ls -la
            echo "Creating minimal ROOT file..."
            cat > ROOT <<'ROOTEOF'
session MethodeSpectrale = HOL +
  theories
    methode_spectral
ROOTEOF
            isabelle build -v -D .
          fi

      - name: Generate SHA256 signatures
        if: success()
        run: |
          echo "=== Generating cryptographic signatures ==="
          
          # Trouver le fichier methode_spectral.thy
          THY_FILE=$(find . -name "methode_spectral.thy" -type f | head -1)
          
          if [ -z "$THY_FILE" ]; then
            echo "ERROR: methode_spectral.thy not found"
            exit 1
          fi
          
          echo "File to sign: $THY_FILE"
          
          # Générer SHA256
          SHA256=$(sha256sum "$THY_FILE" | awk '{print $1}')
          echo "SHA256: $SHA256"
          
          # Sauvegarder les signatures
          mkdir -p signatures
          echo "$SHA256  $THY_FILE" > signatures/methode_spectral.sha256
          
          # Générer aussi MD5 pour validation rapide
          MD5=$(md5sum "$THY_FILE" | awk '{print $1}')
          echo "$MD5  $THY_FILE" > signatures/methode_spectral.md5
          
          # Créer un fichier de métadonnées
          cat > signatures/METADATA.txt <<'METAEOF'
File: methode_spectral.thy
Author: Philippe Thomas Savard
Co-Authors:
  - Emergent.sh E1
  - Gordon Docker Desktop
  - Copilot Microsoft
License: Apache License 2.0
Repository: agent-multiloop-Gabriel-local
Branch: main
Timestamp: $(date -u +"%Y-%m-%dT%H:%M:%SZ")
METAEOF
          
          cat signatures/METADATA.txt

      - name: Create provenance attestation
        if: success()
        run: |
          echo "=== Creating provenance attestation ==="
          
          THY_FILE=$(find . -name "methode_spectral.thy" -type f | head -1)
          SHA256=$(sha256sum "$THY_FILE" | awk '{print $1}')
          
          cat > attestation_payload.json <<EOF
          {
            "schemaVersion": 1,
            "subject": "$THY_FILE",
            "integrity": {
              "sha256": "$SHA256"
            },
            "provenance": {
              "author": "Philippe Thomas Savard",
              "coAuthors": [
                "Emergent.sh E1",
                "Gordon Docker Desktop",
                "Copilot Microsoft"
              ],
              "repository": "https://github.com/Philippe-Thomas/agent-multiloop-Gabriel-local-final",
              "branch": "main",
              "license": "Apache License 2.0"
            },
            "attestation": "This file is authentic and originates from the authorized repository. The author retains all rights and responsibilities for its content."
          }
          EOF
          
          cat attestation_payload.json

      - name: Generate explicit attestation
        if: success()
        uses: actions/attest@v2
        with:
          subject-path: agent-multiloop-Gabriel-local/theories/methode_spectral.thy
          predicate-type: 'https://example.com/attestations/methode-spectral/v1'
          predicate: '{"schemaVersion":1,"integrity":{"sha256":"verified"},"provenance":{"author":"Philippe Thomas Savard","license":"Apache 2.0"}}'

      - name: Upload signatures and attestation
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: methode-spectral-attestation
          path: |
            attestation_payload.json
            signatures/
            agent-multiloop-Gabriel-local/theories/methode_spectral.thy
          retention-days: 90
          if-no-files-found: warn

      - name: Create signature verification script
        if: success()
        run: |
          cat > verify_methode_spectral.sh <<'VERIFYEOF'
          #!/bin/bash
          # Script to verify methode_spectral.thy authenticity
          
          set -e
          
          if [ ! -f "methode_spectral.thy" ]; then
            echo "ERROR: methode_spectral.thy not found"
            exit 1
          fi
          
          if [ ! -f "methode_spectral.sha256" ]; then
            echo "ERROR: methode_spectral.sha256 signature not found"
            exit 1
          fi
          
          echo "=== Verifying methode_spectral.thy ==="
          sha256sum -c methode_spectral.sha256
          
          echo "✓ File verified: authentic and unmodified"
          echo "✓ Author: Philippe Thomas Savard"
          echo "✓ License: Apache License 2.0"
          echo "✓ Repository: agent-multiloop-Gabriel-local-final (main branch)"
          VERIFYEOF
          
          chmod +x verify_methode_spectral.sh
          echo "Verification script created: verify_methode_spectral.sh"
