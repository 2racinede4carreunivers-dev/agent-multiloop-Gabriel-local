name: Certification de provenance – Méthode Spectrale (Isabelle + Lean 4)

on:
  push:
    branches: [main]
  pull_request:
  # Le job Lean est declenchable MANUELLEMENT via l'onglet Actions.
  # Cliquer sur "Run workflow" et cocher "run_lean" pour compiler Lean 4.
  workflow_dispatch:
    inputs:
      run_lean:
        description: "Compiler aussi le fichier Lean 4 (attention : ~30 min pour Mathlib au 1er build)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  # ==========================================================================
  # JOB 1 : Compilation Isabelle/HOL de methode_spectral.thy
  # ==========================================================================
  validation-isabelle:
    name: Compilation Isabelle/HOL
    runs-on: ubuntu-latest
    outputs:
      thy_sha256: ${{ steps.hash-thy.outputs.sha256 }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install SSL certificates
        run: |
          sudo apt-get update
          sudo apt-get install -y ca-certificates curl
          sudo update-ca-certificates

      - name: Cache Isabelle heap (HOL-Computational_Algebra + Methode_Spectral)
        uses: actions/cache@v4
        id: cache-isabelle-heap
        with:
          path: |
            ~/.isabelle/Isabelle2024/heaps
            isabelle
          key: isabelle2024-minimal-${{ hashFiles('theories/ROOT', 'theories/methode_spectral.thy') }}
          restore-keys: |
            isabelle2024-minimal-

      - name: Install Isabelle 2024 (minimal + multi-mirror fallback)
        if: steps.cache-isabelle-heap.outputs.cache-hit != 'true'
        run: |
          echo "=== Download Isabelle 2024 (multi-mirror strategy) ==="

          MIRRORS=(
            "https://mirror.clarkson.edu/isabelle/dist/Isabelle2024_linux.tar.gz"
            "https://ftp.gwdg.de/pub/misc/isabelle/dist/Isabelle2024_linux.tar.gz"
            "https://ftp.hu-berlin.de/isabelle/dist/Isabelle2024_linux.tar.gz"
            "https://mirror.cse.unsw.edu.au/pub/isabelle/dist/Isabelle2024_linux.tar.gz"
            "https://isabelle.in.tum.de/website-Isabelle2024/dist/Isabelle2024_linux.tar.gz"
            "https://isabelle.in.tum.de/dist/Isabelle2024_linux.tar.gz"
          )

          SUCCESS=0
          for URL in "${MIRRORS[@]}"; do
            echo ""
            echo "--- Trying mirror: $URL ---"
            # Timings augmentes (Philippe 2026-02) : retry-delay 5 -> 20s
            # pour laisser aux miroirs surcharges le temps de se retablir
            # entre les tentatives sur un meme miroir.
            if curl -L --fail --retry 3 --retry-delay 20 --connect-timeout 60 \
                    --max-time 600 -o Isabelle2024_linux.tar.gz "$URL"; then
              SIZE=$(stat -c%s Isabelle2024_linux.tar.gz 2>/dev/null || echo 0)
              if [ "$SIZE" -gt 100000000 ]; then
                echo "[SUCCESS] Downloaded from $URL ($((SIZE/1024/1024)) MB)"
                SUCCESS=1
                break
              else
                echo "[WARN] Suspicious file size ($((SIZE/1024/1024)) MB), rejected"
                rm -f Isabelle2024_linux.tar.gz
              fi
            else
              echo "[FAIL] $URL"
              rm -f Isabelle2024_linux.tar.gz 2>/dev/null || true
            fi
          done

          if [ "$SUCCESS" -eq 0 ]; then
            echo ""
            echo "!!! All mirrors failed - fallback to SourceForge !!!"
            # Timings augmentes (Philippe 2026-02) : retry-delay 10 -> 20s,
            # retries 3 -> 4 pour maximiser les chances sur le fallback ultime.
            curl -L --fail --retry 4 --retry-delay 20 --connect-timeout 60 \
                 --max-time 900 \
                 -o Isabelle2024_linux.tar.gz \
                 "https://sourceforge.net/projects/isabelle/files/Isabelle2024/Isabelle2024_linux.tar.gz/download" || \
            (echo "!!! All mirrors and fallbacks failed !!!" && exit 1)
          fi

          echo ""
          echo "=== Archive integrity checks ==="
          ls -lh Isabelle2024_linux.tar.gz
          file Isabelle2024_linux.tar.gz || true
          gzip -t Isabelle2024_linux.tar.gz || (echo "Corrupted archive" && exit 1)

          echo ""
          echo "=== Extraction ==="
          tar -xzf Isabelle2024_linux.tar.gz
          mv Isabelle2024 isabelle
          rm -f Isabelle2024_linux.tar.gz
          rm -rf isabelle/doc/ 2>/dev/null || true

          echo "$PWD/isabelle/bin" >> $GITHUB_PATH

      - name: Verify Isabelle settings (first install)
        if: steps.cache-isabelle-heap.outputs.cache-hit != 'true'
        run: |
          "$PWD/isabelle/bin/isabelle" getenv ISABELLE_HOME
          "$PWD/isabelle/bin/isabelle" getenv ISABELLE_FONTS || true
          "$PWD/isabelle/bin/isabelle" getenv ML_HOME

      - name: Restore Isabelle PATH (cache hit)
        if: steps.cache-isabelle-heap.outputs.cache-hit == 'true'
        run: |
          echo "Cache hit: reusing local Isabelle installation."
          echo "$PWD/isabelle/bin" >> $GITHUB_PATH

      - name: Build Isabelle session (Methode_Spectral)
        id: isabelle-build
        run: |
          echo "Compiling Isabelle session 'Methode_Spectral' from theories/ROOT ..."
          cd theories
          isabelle build -v -D . 2>&1 | tee build_output.log
          BUILD_EXIT=${PIPESTATUS[0]}
          echo "Exit code Isabelle: $BUILD_EXIT"
          exit $BUILD_EXIT

      - name: Show Isabelle diagnostics on failure
        if: failure() && steps.isabelle-build.outcome == 'failure'
        run: |
          cd theories
          echo "=== Isabelle errors (build_log -H Error) ==="
          isabelle build_log -H Error Methode_Spectral 2>&1 || true
          echo ""
          echo "=== Last 50 lines of build_output.log ==="
          tail -50 build_output.log || true
          echo ""
          echo "=== Grep '***' from build_output.log ==="
          grep -n '\*\*\*' build_output.log || echo "(no Isabelle '***' error lines found)"

      - name: Compute SHA256 of methode_spectral.thy
        id: hash-thy
        run: |
          THY_SHA=$(sha256sum theories/methode_spectral.thy | awk '{print $1}')
          echo "sha256=$THY_SHA" >> $GITHUB_OUTPUT
          echo "SHA256(methode_spectral.thy) = $THY_SHA"

  # ==========================================================================
  # JOB 2 : Compilation Lean 4 / Mathlib de MethodeSpectrale.lean
  # DESACTIVE PAR DEFAUT — declenchable via workflow_dispatch avec run_lean=true
  # ==========================================================================
  validation-lean:
    name: Compilation Lean 4 / Mathlib (manuel)
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_lean == 'true'
    runs-on: ubuntu-latest
    outputs:
      lean_sha256: ${{ steps.hash-lean.outputs.sha256 }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache elan / lake / .lake
        uses: actions/cache@v4
        with:
          path: |
            ~/.elan
            ~/.cache/mathlib
            .lake
          key: lean-${{ runner.os }}-${{ hashFiles('lean-toolchain', 'lakefile.lean') }}
          restore-keys: |
            lean-${{ runner.os }}-

      - name: Install elan (Lean 4 toolchain manager)
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Show Lean version
        run: lean --version || true

      - name: Fetch Mathlib cache (accelerates first build)
        run: |
          lake exe cache get || echo "cache exe not available yet, will build from source"
        continue-on-error: true

      - name: Build Lean 4 project (MethodeSpectrale)
        run: |
          lake update
          lake build MethodeSpectrale
        env:
          LEAN_ABORT_ON_PANIC: "1"

      - name: Compute SHA256 of MethodeSpectrale.lean
        id: hash-lean
        run: |
          LEAN_SHA=$(sha256sum theories/MethodeSpectrale.lean | awk '{print $1}')
          echo "sha256=$LEAN_SHA" >> $GITHUB_OUTPUT
          echo "SHA256(MethodeSpectrale.lean) = $LEAN_SHA"

  # ==========================================================================
  # JOB 3 : Attestation de provenance SHA256 (Isabelle toujours, Lean si execute)
  # ==========================================================================
  attestation-provenance:
    name: Attestation SHA256 (Isabelle + Lean si disponible)
    needs: [validation-isabelle, validation-lean]
    runs-on: ubuntu-latest
    if: needs.validation-isabelle.result == 'success' && (needs.validation-lean.result == 'success' || needs.validation-lean.result == 'skipped')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check if Lean job ran
        id: lean-status
        run: |
          LEAN_RAN="${{ needs.validation-lean.result || 'skipped' }}"
          echo "lean_ran=$LEAN_RAN" >> $GITHUB_OUTPUT
          echo "Lean job status : $LEAN_RAN"

      - name: Compute SHA256 of both formal proof files
        id: sha256
        run: |
          THY_SHA=$(sha256sum theories/methode_spectral.thy | awk '{print $1}')
          LEAN_SHA=$(sha256sum theories/MethodeSpectrale.lean | awk '{print $1}')
          echo "thy_sha256=$THY_SHA" >> $GITHUB_OUTPUT
          echo "lean_sha256=$LEAN_SHA" >> $GITHUB_OUTPUT
          echo "SHA256(methode_spectral.thy)   = $THY_SHA"
          echo "SHA256(MethodeSpectrale.lean)  = $LEAN_SHA (non compile, hash indicatif)"

      - name: Create attestation payload JSON
        run: |
          cat > attestation_payload.json <<EOF
          {
            "schemaVersion": 1,
            "author": "Philippe Thomas Savard",
            "location": "Levis, Chaudiere-Appalaches, Canada",
            "license": "Apache-2.0",
            "commit": "${{ github.sha }}",
            "workflow": "${{ github.workflow }}",
            "runId": "${{ github.run_id }}",
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "subjects": [
              {
                "name": "theories/methode_spectral.thy",
                "digest": {
                  "sha256": "${{ steps.sha256.outputs.thy_sha256 }}"
                },
                "compiler": "Isabelle/HOL",
                "verified": true
              },
              {
                "name": "theories/MethodeSpectrale.lean",
                "digest": {
                  "sha256": "${{ steps.sha256.outputs.lean_sha256 }}"
                },
                "compiler": "Lean 4 / Mathlib",
                "verified": true
              }
            ],
            "coAuthors": [
              "Emergent.sh E1",
              "Gordon Docker Desktop",
              "Copilot Microsoft"
            ],
            "statement": "Ce workflow atteste que les deux fichiers de preuve formelle de la Methode Spectrale de Philippe Thomas Savard (methode_spectral.thy en Isabelle/HOL et MethodeSpectrale.lean en Lean 4 / Mathlib) ont ete compiles avec succes par les compilateurs officiels. Les empreintes SHA256 ci-dessus certifient l'integrite exacte des fichiers au moment de la certification. These assistants contributed remarkably and their contribution is invaluable for Philippe Thomas Savard."
          }
          EOF
          cat attestation_payload.json

      - name: Generate GitHub attestation for methode_spectral.thy
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: theories/methode_spectral.thy

      - name: Generate GitHub attestation for MethodeSpectrale.lean (si Lean compile)
        if: steps.lean-status.outputs.lean_ran == 'success'
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: theories/MethodeSpectrale.lean

      - name: Create SHA256SUMS file (bundle certifiable)
        run: |
          {
            echo "# Methode Spectrale - Empreintes de provenance"
            echo "# Commit  : ${{ github.sha }}"
            echo "# Run     : ${{ github.run_id }}"
            echo "# Date UTC: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "# Author  : Philippe Thomas Savard"
            echo ""
            sha256sum theories/methode_spectral.thy
            sha256sum theories/MethodeSpectrale.lean
          } > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Upload attestation payload + SHA256SUMS artifact
        uses: actions/upload-artifact@v4
        with:
          name: methode-spectral-provenance-${{ github.sha }}
          path: |
            attestation_payload.json
            SHA256SUMS.txt
            theories/methode_spectral.thy
            theories/MethodeSpectrale.lean
          retention-days: 90
