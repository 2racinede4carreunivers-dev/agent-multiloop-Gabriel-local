# Configuration Optimisée - Gabriel Multiloop
# Réduit timeout Ollama + Priorise OpenAI + Cache rapide

llm:
  # IMPORTANT: OpenAI d'abord (15s timeout total)
  provider_order: ["openai", "ollama"]
  default_provider: "openai"
  
  ollama:
    # RÉDUIT: 60s → 15s (fallback rapide)
    timeout: 15
    model: "llama3.2:latest"
    host: "http://ollama:11434"
    # Retry rapide si timeout
    max_retries: 1
    retry_delay: 2
    
  openai:
    model: "gpt-4o-mini"
    timeout: 20
    max_tokens: 2000
    temperature: 0.7

# Multiloop: Moins d'itérations = Plus rapide
multiloop:
  # RÉDUIT: 3 → 2 iterations
  max_iterations: 2
  min_confidence_threshold: 0.80
  refinement_timeout: 10

# Cache: Évite recalculs
cache:
  enabled: true
  ttl_seconds: 3600
  max_size: 1000

# Limites de temps globales
timeouts:
  # Total pipeline: < 20s
  pipeline_total: 20
  # LLM gen: 15s max
  llm_generation: 15
  # Spectral calc: instant
  spectral_calc: 2
  # Validation: 1s
  validation: 1
