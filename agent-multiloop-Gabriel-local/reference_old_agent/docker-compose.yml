# ===========================================
# Agent IA Local Mathématique - Docker Compose
# Version complète avec Isabelle/HOL fonctionnel
# ===========================================

services:

  # ===========================================
  # SERVICE PRINCIPAL : math-agent-cli
  # ===========================================
  math-agent-cli:
    build:
      context: .
    container_name: math-agent-cli
    restart: unless-stopped

    env_file:
      - .env

    environment:
      - OLLAMA_HOST=http://ollama:11434
      - DEFAULT_LANGUAGE=fr

    stdin_open: true
    tty: true

    command: ["python", "main_cli.py"]

    volumes:
      - ./src:/home/agent/app/src
      - ./config.yaml:/home/agent/app/config.yaml:ro
      - ./.env:/home/agent/app/.env:ro
      - ./theories:/theories
      - agent-data:/home/agent/app/data
      - agent-logs:/home/agent/app/logs

    networks:
      - agent-network

    depends_on:
      - ollama
      - isabelle

  llm-agent-multiloop:
    build:
      context: .
    container_name: llm-agent-multiloop-run
    restart: unless-stopped

    env_file:
      - .env

    environment:
      - OLLAMA_HOST=http://ollama:11434
      - DEFAULT_LANGUAGE=fr

    stdin_open: true
    tty: true

    command: ["python", "main_cli.py"]

    volumes:
      - ./src:/home/agent/app/src
      - ./config.yaml:/home/agent/app/config.yaml:ro
      - ./.env:/home/agent/app/.env:ro
      - ./theories:/theories
      - agent-data:/home/agent/app/data
      - agent-logs:/home/agent/app/logs

    networks:
      - agent-network

    depends_on:
      - ollama
      - isabelle

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    volumes:
      - ollama-data:/root/.ollama
    ports:
      - "11434:11434"
    networks:
      - agent-network

  ollama-init:
    image: ollama/ollama:latest
    container_name: ollama-init
    depends_on:
      - ollama
    entrypoint: ["/bin/sh", "-c"]
    command: |
      echo "Attente du démarrage d'Ollama..."
      sleep 30
      OLLAMA_HOST=http://ollama:11434 ollama pull llama3.2 || true
      echo "Modèles téléchargés!"
    networks:
      - agent-network
    restart: "no"

  isabelle:
    image: makarius/isabelle:latest
    container_name: isabelle
    restart: unless-stopped
    volumes:
      - ./theories:/theories
      - isabelle-heaps:/home/isabelle/.isabelle/heaps
    working_dir: /theories
    networks:
      - agent-network
    entrypoint: ["/bin/bash"]
    command: ["-c", "echo 'Isabelle/HOL prêt' && tail -f /dev/null"]

volumes:
  agent-data:
  agent-logs:
  ollama-data:
  isabelle-heaps:

networks:
  agent-network:
    driver: bridge
